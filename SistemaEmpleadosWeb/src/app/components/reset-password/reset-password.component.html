<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="card shadow" style="width: 24rem;">
    <div class="card-body p-4">
      <h2 class="card-title h4 mb-3 text-center">Restablecer contraseña</h2>

      @if (!completado()) {
        <p class="text-muted text-center small mb-4">
          Ingresá el <b>código de 6 dígitos</b> que te enviamos por SMS
          y elegí tu nueva contraseña.
        </p>

        <form (ngSubmit)="enviar()" #f="ngForm">
          <div class="mb-3">
            <label for="telefono" class="form-label small">Teléfono</label>
            <input
              id="telefono"
              type="tel"
              class="form-control"
              inputmode="tel"
              autocomplete="tel"
              placeholder="+5491145551234"
              [disabled]="cargando()"
              [value]="telefono()"
              (input)="telefono.set($any($event.target).value)"
              required
            />
          </div>

          <div class="mb-3">
            <label for="codigo" class="form-label small">Código (6 dígitos)</label>
            <input
              id="codigo"
              type="text"
              class="form-control text-center fw-bold fs-5"
              inputmode="numeric"
              pattern="\d{6}"
              maxlength="6"
              autocomplete="one-time-code"
              placeholder="123456"
              [disabled]="cargando()"
              [value]="codigo()"
              (input)="codigo.set($any($event.target).value.replace(/[^0-9]/g, '').slice(0, 6))"
              required
            />
          </div>

          <div class="mb-3">
            <label for="np" class="form-label small">Nueva contraseña</label>
            <input
              id="np"
              type="password"
              class="form-control"
              autocomplete="new-password"
              minlength="6"
              [disabled]="cargando()"
              [value]="newPassword()"
              (input)="newPassword.set($any($event.target).value)"
              required
            />
          </div>

          <div class="mb-3">
            <label for="cp" class="form-label small">Confirmar contraseña</label>
            <input
              id="cp"
              type="password"
              class="form-control"
              autocomplete="new-password"
              minlength="6"
              [disabled]="cargando()"
              [value]="confirmPassword()"
              (input)="confirmPassword.set($any($event.target).value)"
              required
            />
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100"
            [disabled]="cargando() || f.invalid"
          >
            @if (cargando()) {
              <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              Guardando...
            } @else {
              Guardar contraseña
            }
          </button>

          <div class="text-center mt-3">
            <button
              type="button"
              class="btn btn-link btn-sm p-0 small text-decoration-none"
              [disabled]="cargando()"
              (click)="reenviarCodigo()"
            >
              ¿No recibiste el código? Reenviar
            </button>
          </div>
        </form>
      } @else {
        <div class="alert alert-success small mb-0" role="alert">
          <i class="bi bi-check-circle me-2"></i>
          Contraseña actualizada. Te estamos redirigiendo al login...
        </div>
      }

      <div class="text-center mt-3">
        <a [routerLink]="['/login']" class="small text-decoration-none">
          <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
        </a>
      </div>
    </div>
  </div>
</div>
