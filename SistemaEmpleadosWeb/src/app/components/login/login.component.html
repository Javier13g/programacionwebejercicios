<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="card shadow" style="width: 22rem;">
    <div class="card-body p-4">
      <h2 class="card-title h4 mb-3 text-center">Iniciar sesión</h2>
      <p class="text-muted text-center small mb-4">Sistema Empleados</p>

      <form (ngSubmit)="enviar()" #f="ngForm">
        <div class="mb-3">
          <label for="username" class="form-label small">Usuario</label>
          <input
            id="username"
            type="text"
            class="form-control"
            autocomplete="username"
            [disabled]="cargando()"
            [value]="username()"
            (input)="username.set($any($event.target).value)"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label small">Contraseña</label>
          <input
            id="password"
            type="password"
            class="form-control"
            autocomplete="current-password"
            [disabled]="cargando()"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            required
          />
        </div>
        <button
          type="submit"
          class="btn btn-primary w-100"
          [disabled]="cargando() || f.invalid"
        >
          @if (cargando()) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Ingresando...
          } @else {
            Ingresar
          }
        </button>
      </form>
    </div>
  </div>
</div>
