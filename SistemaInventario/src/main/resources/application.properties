spring.application.name=inventario

# ============================================================================
# DataSource (Aiven MySQL)
# ----------------------------------------------------------------------------
# Las credenciales se inyectan por variables de entorno (cargadas desde .env
# por dotenv-java en InventarioApplication.java).
# Definir ANTES de arrancar la aplicacion:
#   DB_URL       = jdbc:mysql://HOST:PORT/DBNAME?ssl-mode=REQUIRED
#   DB_USERNAME  = usuario
#   DB_PASSWORD  = contrasena
# ============================================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

# ============================================================================
# JWT (HS256)
# ----------------------------------------------------------------------------
# Minimo 32 bytes. Generar con: openssl rand -base64 48
# Definir en .env: JWT_SECRET=<valor-generado>
# ============================================================================
app.jwt.secret=${JWT_SECRET:change-me-please-generate-with-openssl-rand-base64-48}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.issuer=sistema-inventario

# ============================================================================
# Imgur (hosting de imagenes)
# ----------------------------------------------------------------------------
# Registrate en https://api.imgur.com/oauth2/addclient
# Elegi "OAuth 2 authorization without callback" (anon uploads)
# y copia el "Client ID" en IMGUR_CLIENT_ID en .env
#  ============================================================================
app.imgur.client-id=${IMGUR_CLIENT_ID:}

# ============================================================================
# CORS (origenes permitidos)
# ----------------------------------------------------------------------------
# Lista separada por comas. Ejemplo local + Codespaces:
#   http://localhost:4200,https://TU-CODESPACE-4200.app.github.dev
# ============================================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
