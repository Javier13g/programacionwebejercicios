spring.application.name=empleado

# --- DataSource (Aiven MySQL) ---
# Los valores reales se inyectan desde variables de entorno o --spring.datasource.password
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-2e82ba6c-demodatabasemysql.f.aivencloud.com}:${DB_PORT:17534}/${DB_NAME:SistemaEmpleados}?ssl-mode=REQUIRED
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- JWT (HS256) ---
# La clave se inyecta por variable de entorno. Debe tener al menos 32 bytes para HS256.
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.issuer=sistema-empleados
