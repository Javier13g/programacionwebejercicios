spring.application.name=empleado

# ============================================================================
# DataSource (Aiven MySQL)
# ----------------------------------------------------------------------------
# Las credenciales se inyectan por variables de entorno.
# Definir ANTES de arrancar la aplicacion:
#   DB_URL       = jdbc:mysql://HOST:PORT/DBNAME?ssl-mode=REQUIRED
#   DB_USERNAME  = usuario
#   DB_PASSWORD  = contrasena
# ============================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sistema_empleados?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# JWT (HS256)
# ----------------------------------------------------------------------------
# Minimo 32 bytes. Generar con: openssl rand -base64 48
# ============================================================================
app.jwt.secret=${JWT_SECRET:change-me-please-generate-with-openssl-rand-base64-48}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.issuer=sistema-empleados

# ============================================================================
# Twilio (API HTTP) - SMS de recuperacion de contrasena
# ----------------------------------------------------------------------------
# Configurar via variables de entorno (NO commitear credenciales):
#   TWILIO_ACCOUNT_SID = Account SID (ACxxxx)
#   TWILIO_AUTH_TOKEN  = Auth Token
#   TWILIO_FROM_NUMBER = numero Twilio en formato E.164 (+14155552671)
# Si no se configuran, el servicio imprime el contenido en consola (modo dev).
# ============================================================================
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from=${TWILIO_FROM_NUMBER:}

# ============================================================================
# Password Reset (recuperacion de contrasena)
# ============================================================================
app.front.base-url=${FRONT_BASE_URL:http://localhost:4200}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MIN:60}
app.password-reset.sms-expiration-seconds=${PASSWORD_RESET_SMS_EXPIRATION_SECONDS:180}
app.password-reset.sms-max-attempts=${PASSWORD_RESET_SMS_MAX_ATTEMPTS:5}
